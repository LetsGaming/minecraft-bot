# Nightly end-to-end smoke: a real Paper server + the bot in Docker
# Compose, exercised by scripts/e2e-smoke.mjs (RCON reachable, whitelist
# add lands, console commands round-trip). Manual dispatch supported.
name: E2E (nightly)

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start the compose stack (Paper + RCON)
        run: docker compose -f docker-compose.e2e.yml up -d --wait

      - name: Run the smoke script
        run: npm run e2e:smoke

      - name: Compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs --tail 200

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

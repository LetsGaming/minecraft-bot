# Release — on a version tag: full build (bot + dashboard), a tarball
# artifact attached to the GitHub release, and a Docker image pushed to
# GHCR (ghcr.io/<owner>/minecraft-bot:<version> + :latest).
#
# The release body is the CHANGELOG.md section for the tag, followed by
# GitHub's generated notes (What's Changed / Full Changelog).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (bot + schema)
        run: npm run build

      - name: Build dashboard frontend
        run: npm run build:web

      - name: Pack release artifact
        run: |
          tar -czf minecraft-bot-${{ github.ref_name }}.tar.gz \
            src/schema/dist src/core/dist src/bot/dist src/web/dist \
            src/schema/package.json src/core/package.json \
            src/bot/package.json src/web/package.json \
            package.json package-lock.json config.schema.json \
            README.md docs data/dailyRewards.json ecosystem.config.cjs \
            .env.example

      # generate_release_notes builds "What's Changed" out of merged pull
      # requests only — anything pushed straight to main is invisible to it,
      # which is why every release since v4.1.0 has come out as a bare compare
      # link. The CHANGELOG section for the tag is the actual summary, and the
      # API pre-pends `body` to the generated notes, so the release reads:
      # our prose first, then What's Changed / Full Changelog.
      #
      # Matched on the "## [x.y.z]" prefix, so the dash and date that follow
      # can be anything (the bump script writes an em dash, hand-written
      # sections have used a hyphen).
      - name: Extract the CHANGELOG section for this tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v heading="## [$version]" '
            index($0, heading) == 1 { found = 1; next }
            found && /^## \[/       { exit }
            found                   { print }
          ' CHANGELOG.md | sed -e '/./,$!d' > "$RUNNER_TEMP/release-notes.md"

          if [ -s "$RUNNER_TEMP/release-notes.md" ]; then
            echo "Release body: $(wc -l < "$RUNNER_TEMP/release-notes.md") lines from CHANGELOG.md"
          else
            echo "::warning::CHANGELOG.md has no '## [$version]' section (or it is empty) — the release will only carry the generated notes."
          fi

      - name: Attach artifact to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: minecraft-bot-${{ github.ref_name }}.tar.gz
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: true
          overwrite_files: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR repository paths must be lowercase, but github.repository keeps
      # the owner's original casing (LetsGaming). Lowercase it here so the
      # image name is valid regardless of how the owner/repo is capitalised.
      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:latest
# Release — on a version tag: full build (bot + dashboard), a tarball
# artifact attached to the GitHub release, and a Docker image pushed to
# GHCR (ghcr.io/<owner>/minecraft-bot:<version> + :latest).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (bot + schema)
        run: npm run build

      - name: Build dashboard frontend
        run: npm run build:web

      - name: Pack release artifact
        run: |
          tar -czf minecraft-bot-${{ github.ref_name }}.tar.gz \
            src/schema/dist src/core/dist src/bot/dist src/web/dist \
            src/schema/package.json src/core/package.json \
            src/bot/package.json src/web/package.json \
            package.json package-lock.json config.schema.json \
            README.md docs data/dailyRewards.json ecosystem.config.cjs \
            .env.example

      - name: Attach artifact to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: minecraft-bot-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          overwrite_files: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR repository paths must be lowercase, but github.repository keeps
      # the owner's original casing (LetsGaming). Lowercase it here so the
      # image name is valid regardless of how the owner/repo is capitalised.
      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:latest

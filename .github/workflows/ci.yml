# Continuous integration — every gate the project's definition-of-done
# lists: typecheck, lint, tests, locale parity, schema drift, dependency
# audit, and the dashboard frontend build.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # engines requires >= 22.13 (node:sqlite); CI runs the LTS that
          # ships it stable.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Workspace layout (src/ holds workspaces only)
        run: npm run layout:check

      - name: Locale parity (en/de)
        run: npm run i18n:check

      - name: Schema drift (config.schema.json matches the types)
        run: npm run schema:check

      - name: Tests
        run: npm test

      - name: Dependency audit
        run: npm audit --audit-level=high

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard (backend + frontend)
        run: npm run build:all

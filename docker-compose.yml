name: minecraft-bot

# Fully .env-driven — you should not need to edit this file.
#   cp .env.example .env   # fill it in
#   docker compose up -d                  # bot only
#   docker compose --profile web up -d    # bot + dashboard
#
# Every knob below reads from .env with a sensible default (VAR:-default).
# The config itself is SEEDED once into the data/ volume, then the dashboard
# (or a hand edit) owns the copy there; re-seed by clearing it. By default the
# seed is config.template.json with its placeholders filled from .env — point
# MCBOT_CONFIG_FILE at a filled-in file to use a static config instead.
#
# The dashboard is published on loopback only by default; put a TLS-terminating
# reverse proxy in front before exposing it (set WEBUI_BIND_ADDR=0.0.0.0).

services:
  bot:
    build:
      context: .
      target: bot
    image: minecraft-bot:latest
    container_name: minecraft-bot
    restart: unless-stopped

    # .env drives everything. env_file passes through EVERY var in .env — the
    # template's placeholders (substituted at seed time) and any extra
    # like per-server RCON_PASSWORD_<ID>. The explicit entries below just
    # document the common deployment knobs and give them defaults.
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      DEBUG: ${DEBUG:-}
      # The active config lives in the writable data/ volume so the dashboard
      # can edit it and the bot sees the change (they share the volume).
      MCBOT_CONFIG_PATH: /app/data/config.json

    volumes:
      # Config SEED (first run only; the active copy then lives in data/):
      #   - default: config.template.json, env-substituted from .env
      #   - static:  set MCBOT_CONFIG_FILE=./your-config.json in .env
      # The entrypoint prefers the static file when present, else the template.
      # The empty-volume fallback keeps the static mount valid when unset.
      - ${MCBOT_CONFIG_TEMPLATE:-./config.template.json}:/app/config.template.json:ro
      - ${MCBOT_CONFIG_FILE:-mcbot_no_static_config}:/app/config.json:ro

      # Persistent runtime state — SQLite (WAL) + JSON stores + the active
      # config.json. This is the volume to back up.
      # Inspect: docker compose exec bot ls /app/data/
      # Back up: docker compose cp bot:/app/data/ ./data-backup/
      - bot_data:/app/data
      - bot_logs:/app/logs

    # ── Hardening ─────────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: "${LOG_MAX_FILE:-3}"

  # ── Web dashboard (optional — opt in with the "web" profile) ───────────────
  # No depends_on: the bot and dashboard have independent lifecycles and share
  # only the data/ volume (the active config + SQLite in WAL mode) — which also
  # means: same host. The shared volume is the contract.
  web:
    build:
      context: .
      target: web
    image: minecraft-bot-web:latest
    container_name: minecraft-bot-web
    restart: unless-stopped
    profiles: ["web"]

    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      # Shares the bot's config in the data/ volume — the file the dashboard
      # reads and writes. Must match the bot's MCBOT_CONFIG_PATH.
      MCBOT_CONFIG_PATH: /app/data/config.json
      # Inside a container the server must bind beyond loopback; the publish
      # below restricts host exposure to WEBUI_BIND_ADDR.
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: ${WEBUI_PORT:-8130}
      # The dashboard runs on Node 24, so it uses the built-in node:sqlite
      # driver (zero native build) rather than better-sqlite3 — one less thing
      # that can fail to compile against Alpine/musl. Same store format.
      MCBOT_SQLITE_DRIVER: ${MCBOT_SQLITE_DRIVER:-node}
      # Dashboard secrets (it BOOTS without them, but OAuth login fails). Set in
      # .env: WEBUI_SESSION_SECRET (cookie key, >= 16 random chars) and
      # WEBUI_CLIENT_SECRET (Discord OAuth2 secret). WEBUI_METRICS_TOKEN gates
      # GET /metrics with a bearer token (unset = open).

    # Published on WEBUI_BIND_ADDR (default loopback only). Expose to the LAN
    # with WEBUI_BIND_ADDR=0.0.0.0 — only behind a TLS reverse proxy.
    ports:
      - "${WEBUI_BIND_ADDR:-127.0.0.1}:${WEBUI_PORT:-8130}:${WEBUI_PORT:-8130}"

    volumes:
      - ${MCBOT_CONFIG_TEMPLATE:-./config.template.json}:/app/config.template.json:ro
      - ${MCBOT_CONFIG_FILE:-mcbot_no_static_config}:/app/config.json:ro
      - bot_data:/app/data
      - bot_logs:/app/logs

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.WEBUI_PORT||8130)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: "${LOG_MAX_FILE:-3}"

volumes:
  bot_data:
  bot_logs:
  # Empty fallback so the static-config mount is always valid when
  # MCBOT_CONFIG_FILE is unset (the env-substituted template is used instead).
  mcbot_no_static_config:
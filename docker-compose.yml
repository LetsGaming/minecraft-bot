name: minecraft-bot

services:
  bot:
    build:
      context: .
      target: bot
    image: minecraft-bot:latest
    container_name: minecraft-bot
    restart: unless-stopped

    # ── Environment ───────────────────────────────────────────────────────────
    # .env is optional — inline overrides below always apply.
    # Copy .env.example to .env and fill in your values.
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      # The active config lives in the writable data/ volume so the dashboard
      # can edit it and the bot sees the change (bot + web share the volume).
      # The entrypoint seeds it there once from the template/static mount below.
      MCBOT_CONFIG_PATH: /app/data/config.json
      # TZ is read from .env; override here if needed:
      # TZ: Europe/Berlin
      # DEBUG: "true"

    # ── Config ────────────────────────────────────────────────────────────────
    # The ACTIVE config lives in the data/ volume (MCBOT_CONFIG_PATH above), so
    # the dashboard can edit it and the bot picks the change up. On first run
    # the entrypoint SEEDS it there from one of the mounts below; after that the
    # copy in data/ is authoritative (edit it via the dashboard, or clear it to
    # re-seed). Choose ONE seed strategy:
    #
    # Option A — Template (recommended for first-time setup):
    #   Fill in .env, then let the entrypoint substitute variables at startup.
    #
    # Option B — Static file (for complex multi-server / multi-guild configs):
    #   Copy config_structure.json → config.json, fill it in, mount it here.
    #
    volumes:
      # Option A (default): template-based config seed
      - ./config.template.json:/app/config.template.json:ro
      # Option B: static config seed — comment out A and uncomment this line
      # - ./config.json:/app/config.json:ro

      # Persistent runtime state (includes the active config.json).
      # Named volumes are managed by Docker and survive image rebuilds.
      # To inspect: docker compose exec bot ls /app/data/
      # To back up: docker compose cp bot:/app/data/ ./data-backup/
      - bot_data:/app/data
      - bot_logs:/app/logs

    # ── Hardening ─────────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

    # ── Logging ───────────────────────────────────────────────────────────────
    # Logs are also written to the bot_logs volume as logs/bot.log.
    # docker compose logs -f  shows live output from stdout.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Web dashboard (optional extension — opt in with the "web" profile) ────
  # Start both:      docker compose --profile web up -d
  # Dashboard only:  docker compose --profile web up -d web
  #
  # Deliberately no depends_on: the dashboard and the bot have independent
  # lifecycles — either runs, restarts, and works without the other. They
  # share config.json and the data volume (JSON stores + SQLite in WAL
  # mode), which also means: same host. The shared volume is the contract.
  web:
    build:
      context: .
      target: web
    image: minecraft-bot-web:latest
    container_name: minecraft-bot-web
    restart: unless-stopped
    profiles: ["web"]

    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      # Shares the bot's config in the data/ volume — this is the file the
      # dashboard reads and writes. Must match the bot's MCBOT_CONFIG_PATH.
      MCBOT_CONFIG_PATH: /app/data/config.json
      # Inside a container the server must bind beyond loopback; publishing
      # below still restricts it to the host's loopback.
      WEBUI_HOST: 0.0.0.0
      # The dashboard opens the shared SQLite store at startup. It runs on
      # Node 24, so it uses the built-in node:sqlite driver (zero native
      # build) rather than better-sqlite3 — one less thing that can fail to
      # compile against Alpine/musl and crash-loop the container. The store
      # format is identical; the bot may keep using better-sqlite3. Remove
      # this only if you deliberately want the native driver here too.
      MCBOT_SQLITE_DRIVER: node
      # WEBUI_METRICS_TOKEN: set in .env to gate /metrics with a bearer token
      #
      # The dashboard needs these two secrets to serve authenticated routes
      # (it BOOTS without them, but OAuth login fails). Put them in .env:
      #   WEBUI_SESSION_SECRET  cookie-signing key, >= 16 random chars
      #   WEBUI_CLIENT_SECRET   Discord application OAuth2 secret

    # Published on the HOST's loopback only. Put a TLS-terminating reverse
    # proxy in front before exposing the dashboard to a LAN or the internet
    # (see docs/dev/webui-integration.md).
    ports:
      - "127.0.0.1:8130:8130"

    volumes:
      # Config seed (see the bot service for the A/B options). The active
      # config is the copy in the shared data/ volume below.
      - ./config.template.json:/app/config.template.json:ro
      # - ./config.json:/app/config.json:ro
      - bot_data:/app/data
      - bot_logs:/app/logs

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8130/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_data:
  bot_logs:
